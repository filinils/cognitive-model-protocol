name: Ethical concern
description: Raise an ethical risk, misuse case, or boundary concern.
title: "[Ethical concern]: "
labels:
  - critique
  - ethics
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What ethical concern should CMP address?
    validations:
      required: true
  - type: input
    id: relevant-cmp-section
    attributes:
      label: Relevant CMP section
      description: Link or name the section, file, or schema field.
    validations:
      required: true
  - type: textarea
    id: evidence-or-example
    attributes:
      label: Evidence or example
      description: Provide evidence, a concrete example, or a plausible misuse scenario.
    validations:
      required: true
  - type: textarea
    id: why-it-matters
    attributes:
      label: Why it matters
      description: Explain the consequence for users, affected groups, builders, or governance.
    validations:
      required: true
  - type: textarea
    id: suggested-change
    attributes:
      label: Suggested change, if any
      description: Suggest a mitigation, boundary, or wording change if you have one.
    validations:
      required: false
